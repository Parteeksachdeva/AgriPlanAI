name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build
        run: pnpm --dir frontend build
        env:
          # Fall back to live App Runner URL if secret is not set
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://rppd9c8vep.us-east-1.awsapprunner.com' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Amplify
        run: |
          cd frontend/dist && zip -r ../../dist.zip . && cd ../..
          RESULT=$(aws amplify create-deployment \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name main \
            --query '{jobId:jobSummary.jobId,uploadUrl:zipUploadUrl}' \
            --output json)
          curl -T dist.zip "$(echo $RESULT | jq -r '.uploadUrl')"
          aws amplify start-deployment \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name main \
            --job-id "$(echo $RESULT | jq -r '.jobId')"
